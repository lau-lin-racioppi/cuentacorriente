<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patrimonio Personal</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header>
    <h1>Patrimonio Personal</h1>
    <span class="header-sub">sin servidor · sin conversión de monedas</span>
  </header>

  <main>

    <!-- Resumen patrimonio neto -->
    <section id="net-worth-summary"></section>

    <!-- Tabs -->
    <div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="tab-assets">Activos</button>
        <button class="tab-btn" data-tab="tab-liabilities">Pasivos</button>
        <button class="tab-btn" data-tab="tab-history">Historial</button>
      </nav>

      <!-- Tab: Activos -->
      <div class="tab-panel active" id="tab-assets">
        <div class="panel-header">
          <h2>Activos</h2>
          <button class="btn btn-primary" id="btn-new-asset">+ Nuevo activo</button>
        </div>
        <div id="asset-list"></div>
      </div>

      <!-- Tab: Pasivos -->
      <div class="tab-panel" id="tab-liabilities">
        <div class="panel-header">
          <h2>Pasivos</h2>
          <button class="btn btn-primary" id="btn-new-liability">+ Nuevo pasivo</button>
        </div>
        <div id="liability-list"></div>
      </div>

      <!-- Tab: Historial -->
      <div class="tab-panel" id="tab-history">
        <div class="panel-header">
          <h2>Historial de snapshots</h2>
          <button class="btn btn-primary" id="btn-new-snapshot">+ Registrar ahora</button>
        </div>
        <div class="chart-container" style="margin-bottom: 16px;">
          <canvas id="history-chart"></canvas>
        </div>
        <div id="snapshot-list"></div>
      </div>
    </div>

  </main>

  <!-- Modal: Activo -->
  <div class="modal" id="asset-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="asset-modal-title">Nuevo activo</h2>
        <button class="modal-close" aria-label="Cerrar">&times;</button>
      </div>
      <div class="error-list" id="asset-errors"></div>
      <form id="asset-form" novalidate>
        <div class="form-group">
          <label for="asset-name">Nombre</label>
          <input type="text" id="asset-name" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="asset-category">Categoría</label>
            <select id="asset-category">
              <option value="cash">Efectivo</option>
              <option value="investment">Inversión</option>
              <option value="real_estate">Inmueble</option>
              <option value="vehicle">Vehículo</option>
              <option value="other">Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label for="asset-currency">Moneda</label>
            <select id="asset-currency">
              <option value="ARS">ARS</option>
              <option value="USD">USD</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="asset-value">Valor</label>
            <input type="number" id="asset-value" min="0" step="any" required />
          </div>
          <div class="form-group">
            <label for="asset-valuation-date">Fecha de valuación</label>
            <input type="date" id="asset-valuation-date" required />
          </div>
        </div>
        <div class="form-group">
          <label for="asset-linked-liability">Pasivo vinculado</label>
          <select id="asset-linked-liability">
            <option value="">— ninguno —</option>
          </select>
        </div>
        <div class="form-group">
          <label for="asset-notes">Notas</label>
          <textarea id="asset-notes"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary btn-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Pasivo -->
  <div class="modal" id="liability-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="liability-modal-title">Nuevo pasivo</h2>
        <button class="modal-close" aria-label="Cerrar">&times;</button>
      </div>
      <div class="error-list" id="liability-errors"></div>
      <form id="liability-form" novalidate>
        <div class="form-group">
          <label for="liability-name">Nombre</label>
          <input type="text" id="liability-name" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="liability-category">Categoría</label>
            <select id="liability-category">
              <option value="mortgage">Hipoteca</option>
              <option value="loan">Préstamo</option>
              <option value="debt">Deuda</option>
              <option value="other">Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label for="liability-currency">Moneda</label>
            <select id="liability-currency">
              <option value="ARS">ARS</option>
              <option value="USD">USD</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="liability-total">Monto total</label>
            <input type="number" id="liability-total" min="0" step="any" required />
          </div>
          <div class="form-group">
            <label for="liability-remaining">Saldo restante</label>
            <input type="number" id="liability-remaining" min="0" step="any" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="liability-start-date">Fecha de inicio</label>
            <input type="date" id="liability-start-date" required />
          </div>
          <div class="form-group">
            <label for="liability-end-date">Fecha de fin</label>
            <input type="date" id="liability-end-date" />
          </div>
        </div>
        <div class="form-group">
          <label for="liability-linked-asset">Activo vinculado</label>
          <select id="liability-linked-asset">
            <option value="">— ninguno —</option>
          </select>
        </div>
        <div class="form-group">
          <label for="liability-notes">Notas</label>
          <textarea id="liability-notes"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary btn-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Snapshot -->
  <div class="modal" id="snapshot-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Registrar snapshot</h2>
        <button class="modal-close" aria-label="Cerrar">&times;</button>
      </div>
      <p style="font-size:13px; color: #6c757d; margin-bottom:16px;">
        Se guardará el estado actual de activos y pasivos con la fecha y hora de ahora.
      </p>
      <form id="snapshot-form" novalidate>
        <div class="form-group">
          <label for="snapshot-notes">Notas (opcional)</label>
          <textarea id="snapshot-notes"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary btn-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar snapshot</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Chart.js desde CDN (única dependencia externa permitida) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- Módulos en orden de dependencia -->
  <script src="js/storage.js"></script>
  <script src="js/model.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
