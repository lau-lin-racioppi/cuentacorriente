  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d12;
      --panel: #121622;
      --line: rgba(255,255,255,0.07);
      --text: #e9ecf1;
      --muted: #6b7a96;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Background glow spots ── */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 700px;
      height: 700px;
      top: -200px;
      right: -200px;
      background: radial-gradient(circle, rgba(37,99,235,0.13) 0%, transparent 70%);
    }
    body::after {
      width: 600px;
      height: 600px;
      bottom: -150px;
      left: -150px;
      background: radial-gradient(circle, rgba(49,46,129,0.16) 0%, transparent 70%);
    }

    /* ── Navbar ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: linear-gradient(to top, #0b0d12 0%, rgba(235,240,255,0.85) 25%, #ffffff 85%);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      color: #0f172a;
    }

    .nav-logo {
      width: 44px;
      height: 44px;
      object-fit: contain;
      flex-shrink: 0;
      background: #ffffff;
      border-radius: 6px;
      padding: 4px;
    }

    .nav-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
      line-height: 1;
    }

    /* ── Nav links ── */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-link {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      color: #0f172a;
      transition: background 0.15s ease, color 0.15s ease;
      white-space: nowrap;
    }

    .nav-link:hover {
      background: rgba(0,0,0,0.05);
    }

    .nav-link--primary {
      background: rgba(37,99,235,0.12);
      color: #1d4ed8;
    }

    .nav-link--primary:hover {
      background: rgba(37,99,235,0.2);
    }

    .nav-link--disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .hero h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .hero-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 20px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
      box-shadow:
        0 0 20px rgba(37,99,235,0.35),
        0 4px 12px rgba(0,0,0,0.3);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      border-radius: inherit;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 32px rgba(37,99,235,0.55),
        0 8px 20px rgba(0,0,0,0.35);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-arrow {
      font-size: 16px;
      transition: transform 0.15s ease;
    }

    .btn-primary:hover .btn-arrow {
      transform: translateX(3px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 1px solid var(--line);
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
  </style>
</head>
